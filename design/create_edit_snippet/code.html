<textarea class="flex-1 bg-transparent border-none focus:ring-0 p-3 font-code-md text-code-md text-primary-fixed leading-relaxed resize-none overflow-y-auto whitespace-pre" placeholder="// Write your snippet here..." spellcheck="false">import { useState, useEffect } from 'react';

export function useDebounce&lt;T&gt;(value: T, delay: number): T {
  const [debouncedValue, setDebouncedValue] = useState&lt;T&gt;(value);

  useEffect(() =&gt; {
    const timer = setTimeout(() =&gt; {
      setDebouncedValue(value);
    }, delay);

    return () =&gt; {
      clearTimeout(timer);
    };
  }, [value, delay]);

  return debouncedValue;
}</textarea>
